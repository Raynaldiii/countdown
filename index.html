<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRI Contract Countdown</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#00529B,#00AEEF);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
width:900px;
max-width:95%;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:35px;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:40px;
}

.box{
background:rgba(255,255,255,.15);
padding:25px;
border-radius:15px;
text-align:center;
}

.box h2{
font-size:45px;
}

.box span{
font-size:18px;
opacity:.8;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-top:25px;
}

.info-card{
background:rgba(255,255,255,.12);
padding:20px;
border-radius:15px;
}

.progress{
width:100%;
height:20px;
background:rgba(255,255,255,.2);
border-radius:50px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#00ff95;
transition:1s;
}

p{
margin:8px 0;
font-size:16px;
}

.footer{
margin-top:30px;
text-align:center;
opacity:.8;
font-size:14px;
}

@media(max-width:700px){

.countdown{
grid-template-columns:repeat(2,1fr);
}

.info{
grid-template-columns:1fr;
}

.box h2{
font-size:35px;
}

}
</style>

</head>
<body>

<div class="card">

<h1>🏦 BRI Contract Countdown</h1>

<div class="subtitle">

15 July 2026 → 14 July 2027

</div>

<div class="countdown">

<div class="box">
<h2 id="days">0</h2>
<span>Days</span>
</div>

<div class="box">
<h2 id="hours">0</h2>
<span>Hours</span>
</div>

<div class="box">
<h2 id="minutes">0</h2>
<span>Minutes</span>
</div>

<div class="box">
<h2 id="seconds">0</h2>
<span>Seconds</span>
</div>

</div>

<div class="info">

<div class="info-card">

<h3>📈 Contract Progress</h3>

<p>Completed :</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="percent"></p>

</div>

<div class="info-card">

<h3>💼 Remaining Working Days</h3>

<p id="working"></p>

<p id="today"></p>

</div>

</div>

<div class="footer">

Made by Mike ❤️

</div>

</div>

<script>

const start = new Date("2026-07-15T00:00:00");
const end = new Date("2027-07-14T23:59:59");

function workingDays(startDate,endDate){

let count=0;

let current=new Date(startDate);

while(current<=endDate){

let day=current.getDay();

if(day!==0 && day!==6){
count++;
}

current.setDate(current.getDate()+1);

}

return count;

}

function update(){

const now=new Date();

let diff=end-now;

if(diff<0){

document.body.innerHTML="<h1 style='color:white'>🎉 CONTRACT FINISHED 🎉</h1>";

return;

}

const day=Math.floor(diff/(1000*60*60*24));

const hour=Math.floor((diff/(1000*60*60))%24);

const minute=Math.floor((diff/(1000*60))%60);

const second=Math.floor((diff/1000)%60);

days.innerHTML=day;
hours.innerHTML=hour;
minutes.innerHTML=minute;
seconds.innerHTML=second;

const total=end-start;

const passed=now-start;

let percent=(passed/total)*100;

if(percent<0) percent=0;
if(percent>100) percent=100;

bar.style.width=percent+"%";

document.getElementById("percent").innerHTML=
percent.toFixed(2)+"% Completed";

const work=workingDays(now,end);

document.getElementById("working").innerHTML=
work+" Working Days Remaining";

document.getElementById("today").innerHTML=
"Today : "+now.toLocaleString();

}

update();

setInterval(update,1000);

</script>

</body>
</html>
